<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0a0a0a"/>
  <g fill="none" stroke="#fafafa" stroke-width="11" stroke-linejoin="round" stroke-linecap="round">
    <!-- crown: connects the two temples over the top of the head -->
    <path d="M 340,350 Q 512,150 684,350"/>
    <!-- signature white facial lines (lyre) from temples to the beak -->
    <path d="M 340,350 Q 436,448 500,478"/>
    <path d="M 684,350 Q 588,448 524,478"/>
    <!-- beak pointing down -->
    <path d="M 500,478 Q 470,575 512,656 Q 554,575 524,478"/>
    <!-- white stripe down the beak -->
    <path d="M 512,494 L 512,636"/>
    <!-- eyes at the temples -->
    <circle cx="392" cy="372" r="7"/>
    <circle cx="632" cy="372" r="7"/>
    <!-- white breast flaring below -->
    <path d="M 474,658 Q 384,700 316,790"/>
    <path d="M 550,658 Q 640,700 708,790"/>
  </g>
</svg>
